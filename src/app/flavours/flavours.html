<div class="jelly-flavours text-center py-5">
    <h2>CHOOSE YOUR JELLY FLAVOR:</h2>
    <div class="container" style="max-width: 500px;">
        <div class="row mt-3">
            <div class="col"><button class="btn btn-grape" (click)="chooseTheme('grape')">Grape</button></div>
            <div class="col"><button class="btn btn-blueberry" (click)="chooseTheme('blueberry')">Blueberry</button></div>
            <div class="col"><button class="btn btn-sky" (click)="chooseTheme('sky')">Sky</button></div>
        </div>
        <div class="row mt-3">
            <div class="col"><button class="btn btn-kiwi" (click)="chooseTheme('kiwi')">Kiwi</button></div>
            <div class="col"><button class="btn btn-ananas" (click)="chooseTheme('ananas')">Ananas</button></div>
            <div class="col"><button class="btn btn-orange" (click)="chooseTheme('orange')">Orange</button></div>
        </div>
        <div class="row mt-3">
            <div class="col"><button class="btn btn-cherry" (click)="chooseTheme('cherry')">Cherry</button></div>
            <div class="col"><button class="btn btn-strawberry" (click)="chooseTheme('strawberry')">Strawberry</button></div>
            <div class="col"><button class="btn btn-peach" (click)="chooseTheme('peach')">Peach</button></div></div>
        </div>
</div>
